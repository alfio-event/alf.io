name: Build and publish to Docker registries

on:
    push:
        branches:
            - main
        tags:
            - "*"

jobs:
    build:
        uses: ./.github/workflows/build.yml
        secrets: inherit

    push_image_dev:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'alfio-event/alf.io' && github.event_name == 'push' }}
        needs: build
        name: Push dev image
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
            - name: Configure Docker
              uses: docker/setup-buildx-action@v3
            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.CR_USER }}
                  password: ${{ secrets.CR_PAT }}
            - name: Inject slug/short variables
              uses: rlespinasse/github-slug-action@v4
            - name: Push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./dockerize
                  tags: |
                      ghcr.io/alfio-event/alf.io/dev-${{ env.GITHUB_REF_SLUG }}:latest
                  platforms: linux/amd64,linux/arm64
                  push: true

    push_image_prod:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'alfio-event/alf.io' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        needs: build
        name: Push PROD image
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3
            - name: Configure Docker
              uses: docker/setup-buildx-action@v3
            - name: Login to Container Registry (GitHub)
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ secrets.CR_USER }}
                  password: ${{ secrets.CR_PAT }}
            - name: Login to Container Registry (Docker)
              uses: docker/login-action@v3
              with:
                  registry: docker.io
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./dockerize
                  tags: |
                      ghcr.io/alfio-event/alf.io/prod:${{github.ref_name}}
                      alfio/alf.io:${{github.ref_name}}
                      alfio/alf.io:latest
                  platforms: linux/amd64,linux/arm64
                  push: true
