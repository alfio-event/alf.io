name: Test PR

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    pull-requests: write
    contents: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: 17
                  distribution: temurin
                  cache: gradle

            - uses: pnpm/action-setup@v3
              with:
                  version: 11.1.2

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Run Backend Tests
              run: ./gradlew test jacocoTestReport -Dpgsql.version=16

            - name: Run Frontend Tests
              run: |
                  pnpm --prefix frontend install
                  pnpm --prefix frontend run coverage

            - name: Prepare Coverage for Deployment
              run: |
                  mkdir -p public-coverage
                  mkdir -p public-coverage/backend
                  mkdir -p public-coverage/frontend-admin
                  mkdir -p public-coverage/frontend-public
                  cp -r build/reports/jacoco/test/html/* public-coverage/backend/
                  cp -r frontend/admin/coverage/* public-coverage/frontend-admin/
                  cp -r frontend/projects/public/coverage/* public-coverage/frontend-public/
                  cat <<EOF > public-coverage/index.html
                  <!DOCTYPE html>
                  <html>
                  <head><title>Coverage Reports - PR #${{ github.event.number }}</title></head>
                  <body>
                  <h1>Coverage Reports - PR #${{ github.event.number }}</h1>
                  <ul>
                  <li><a href="backend/index.html">Backend (Jacoco)</a></li>
                  <li><a href="frontend-admin/index.html">Frontend Admin</a></li>
                  <li><a href="frontend-public/index.html">Frontend Public</a></li>
                  </ul>
                  </body>
                  </html>
                  EOF

            - name: Deploy PR Coverage to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./public-coverage
                  destination_dir: pr-${{ github.event.number }}
                  keep_files: true

            - name: Comment on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const repo = context.repo.repo;
                      const owner = context.repo.owner;
                      const prNumber = context.issue.number;
                      const link = `https://${owner}.github.io/${repo}/pr-${prNumber}/`;
                      github.rest.issues.createComment({
                        issue_number: prNumber,
                        owner: owner,
                        repo: repo,
                        body: `Se completó la generación del reporte de cobertura.\n\nEspera 1-2 minutos y revisa los [Reportes de Cobertura](${link})`
                      })
