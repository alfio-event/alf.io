name: Test PR

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    pull-requests: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: 17
                  distribution: temurin
                  cache: gradle

            - uses: pnpm/action-setup@v3
              with:
                  version: 11.1.2

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"
                  cache-dependency-path: frontend/pnpm-lock.yaml

            - name: Run Backend Tests
              run: ./gradlew test jacocoTestReport -Dpgsql.version=16

            - name: Run Frontend Tests
              run: |
                  pnpm --prefix frontend install
                  pnpm --prefix frontend run coverage

            - name: Upload Coverage Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: |
                      build/reports/jacoco/test/html
                      frontend/admin/coverage
                      frontend/projects/public/coverage
                  retention-days: 7

            - name: Comment on PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const run_id = context.runId;
                      const repo = context.repo.repo;
                      const owner = context.repo.owner;
                      const link = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${run_id}`;
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: owner,
                        repo: repo,
                        body: `Test suite completed! \n\n📊 [View Coverage Reports and Artifacts](${link})`
                      })
